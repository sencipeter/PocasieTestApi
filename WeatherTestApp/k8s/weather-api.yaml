apiVersion: v1
kind: Namespace
metadata:
  name: weather-api
---
apiVersion: v1
kind: Secret
metadata:
  name: weather-api-secrets
  namespace: weather-api
type: Opaque
stringData:
  jwt-key: "MC%dlBeKqcvTfAh!V&jWRo-GL6sumpJ1Q0xUSDi9P3kyrIn5"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: weather-api-config
  namespace: weather-api
data:
  ASPNETCORE_ENVIRONMENT: "Production"
  ASPNETCORE_HTTP_PORTS: "8080"
  WeatherApi__BaseUrl: "https://nejakepocasie.net/"
  Jwt__Issuer: "WeatherTestApp"
  Jwt__Audience: "WeatherTestApp"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-api
  namespace: weather-api
  labels:
    app: weather-api
spec:
  replicas: 3                         # multiple instances
  selector:
    matchLabels:
      app: weather-api
  template:
    metadata:
      labels:
        app: weather-api
    spec:
      containers:
        - name: weather-api
          image: weathertestappapi:dev  # replace with your registry image e.g. myregistry.azurecr.io/weathertestappapi:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: weather-api-config
          env:
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: weather-api-secrets
                  key: jwt-key
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: weather-api
  namespace: weather-api
spec:
  selector:
    app: weather-api
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: weather-api
  namespace: weather-api
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: weather-api.local         
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: weather-api
                port:
                  number: 80
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: weather-api
  namespace: weather-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: weather-api
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
